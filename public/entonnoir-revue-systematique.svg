<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 762" role="img"
     aria-label="Entonnoir d'une revue systématique. 10 404 articles trouvés. On retire les doublons (−1 194) : 9 210 restants. Tri sur titres et résumés (−9 190) : 20 lus en entier, tous confirmés au texte intégral selon les critères PICOS. La recherche manuelle dans les bibliographies et la littérature grise ajoute 20 études. Total : 40 études incluses.">
  <defs>
    <style>
      .num  { font-family: Georgia,'Times New Roman',serif; font-weight:700; fill:#2A201A; }
      .mlab { font-family:'Helvetica Neue',Arial,sans-serif; fill:#8A7E6E; letter-spacing:1.6px; }
      .step { font-family: Georgia,'Times New Roman',serif; font-style:italic; }
      .exp  { font-family:'Helvetica Neue',Arial,sans-serif; fill:#54504A; }
      .cap  { font-family:'Helvetica Neue',Arial,sans-serif; fill:#4A4744; }
      .foot { font-family:'Helvetica Neue',Arial,sans-serif; fill:#8A7E6E; letter-spacing:0.4px; }
      .h1   { font-family: Georgia,'Times New Roman',serif; font-weight:700; fill:#211915; }
      .h2   { font-family:'Helvetica Neue',Arial,sans-serif; fill:#8A7E6E; letter-spacing:2px; }
      .delta{ font-family:'Helvetica Neue',Arial,sans-serif; font-weight:700; fill:#B56C42; }
    </style>
    <linearGradient id="fun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EBDE"/>
      <stop offset="1" stop-color="#E6D2BC"/>
    </linearGradient>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#516A72"/>
    </marker>
    <filter id="psh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#6A4638" flood-opacity="0.20"/>
    </filter>
    <clipPath id="fclip">
      <path d="M150,172 C232,300 316,378 366,462 L366,560 L454,560 L454,462 C504,378 588,300 670,172 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="980" height="762" fill="#FBF9F5"/>

  <!-- title -->
  <text class="h1" x="490" y="52" font-size="25" text-anchor="middle">De 10&#8239;404 articles à 40 études</text>
  <text class="h2" x="490" y="76" font-size="11" text-anchor="middle">L’ENTONNOIR D’UNE REVUE SYSTÉMATIQUE</text>
  <line x1="458" y1="90" x2="522" y2="90" stroke="#B56C42" stroke-width="2.4"/>

  <!-- funnel -->
  <path d="M150,172 C232,300 316,378 366,462 L366,560 L454,560 L454,462 C504,378 588,300 670,172 Z"
        fill="url(#fun)" stroke="#D9C4A9" stroke-width="1.4"/>
  <g clip-path="url(#fclip)" stroke="#D9C4A9" stroke-width="1">
    <line x1="150" y1="292" x2="670" y2="292"/>
    <line x1="150" y1="420" x2="670" y2="420"/>
  </g>

  <!-- tier numbers -->
  <text class="num" x="410" y="240" font-size="34" text-anchor="middle">10&#8239;404</text>
  <text class="mlab" x="410" y="262" font-size="9.5" text-anchor="middle">ARTICLES TROUVÉS</text>
  <text class="num" x="410" y="366" font-size="29" text-anchor="middle">9&#8239;210</text>
  <text class="mlab" x="410" y="387" font-size="9" text-anchor="middle">RESTANTS</text>
  <text class="num" x="410" y="516" font-size="23" text-anchor="middle">20</text>

  <!-- ===== RIGHT : the subtractions ===== -->
  <!-- step 1 -->
  <circle cx="616" cy="250" r="2.6" fill="#B56C42"/>
  <line x1="616" y1="250" x2="636" y2="250" stroke="#C7B49B" stroke-width="1"/>
  <text class="step" x="644" y="246" font-size="14" fill="#6A4638">1 · On retire les doublons</text>
  <text class="delta" x="952" y="246" font-size="12.5" text-anchor="end">−1&#8239;194</text>
  <text class="exp" x="644" y="265" font-size="11.5">Un même article est indexé dans plusieurs</text>
  <text class="exp" x="644" y="280" font-size="11.5">bases ; on ne le compte qu’une seule fois.</text>

  <!-- step 2 -->
  <circle cx="521" cy="362" r="2.6" fill="#B56C42"/>
  <line x1="521" y1="362" x2="636" y2="362" stroke="#C7B49B" stroke-width="1"/>
  <text class="step" x="644" y="358" font-size="14" fill="#6A4638">2 · Tri sur titres &amp; résumés</text>
  <text class="delta" x="952" y="358" font-size="12.5" text-anchor="end">−9&#8239;190</text>
  <text class="exp" x="644" y="377" font-size="11.5">On lit seulement titre et résumé, sans ouvrir</text>
  <text class="exp" x="644" y="392" font-size="11.5">l’article, pour écarter tout le hors-sujet.</text>

  <!-- step 3 -->
  <circle cx="454" cy="470" r="2.6" fill="#B56C42"/>
  <line x1="454" y1="470" x2="636" y2="470" stroke="#C7B49B" stroke-width="1"/>
  <text class="step" x="644" y="466" font-size="14" fill="#6A4638">3 · Lecture du texte intégral</text>
  <text class="exp" x="644" y="485" font-size="11.5">Chaque étude restante est lue en entier pour</text>
  <text class="exp" x="644" y="500" font-size="11.5">vérifier tous les critères PICOS.</text>
  <text class="exp" x="644" y="515" font-size="11.5" style="fill:#6A4638"><tspan font-style="italic">Les 20 passent le test.</tspan></text>

  <!-- ===== LEFT : the addition ===== -->
  <text class="step" x="40" y="452" font-size="14" fill="#516A72">+ Recherche manuelle</text>
  <text class="exp" x="40" y="471" font-size="11.5">On fouille les bibliographies des études</text>
  <text class="exp" x="40" y="486" font-size="11.5">déjà retenues et la littérature grise (thèses,</text>
  <text class="exp" x="40" y="501" font-size="11.5">actes de congrès) : 20 études de plus, que</text>
  <text class="exp" x="40" y="516" font-size="11.5">les moteurs de recherche avaient ratées.</text>

  <rect x="70" y="590" width="150" height="64" rx="14" fill="#FFFFFF" stroke="#516A72" stroke-width="1.4"/>
  <text class="num" x="145" y="620" font-size="21" text-anchor="middle" style="fill:#516A72">+20</text>
  <text class="mlab" x="145" y="638" font-size="8.5" text-anchor="middle" style="fill:#516A72">TROUVÉS À LA MAIN</text>
  <path d="M220,626 C246,630 258,632 280,634" fill="none" stroke="#516A72" stroke-width="1.4" marker-end="url(#arw)"/>

  <!-- drip + pool -->
  <line x1="410" y1="560" x2="410" y2="592" stroke="#B56C42" stroke-width="1.6"/>
  <rect x="286" y="596" width="248" height="80" rx="18" fill="#B56C42" filter="url(#psh)"/>
  <text class="num" x="410" y="636" font-size="35" text-anchor="middle" style="fill:#FBF9F5">40</text>
  <text class="mlab" x="410" y="659" font-size="9.5" text-anchor="middle" style="fill:#F3E4D4">ÉTUDES INCLUSES</text>

  <!-- equation + source -->
  <text class="cap" x="410" y="706" font-size="12.5" text-anchor="middle">20 (entonnoir)&#160;&#160;+&#160;&#160;20 (recherche manuelle)&#160;&#160;=&#160;&#160;40</text>
  <text class="foot" x="410" y="728" font-size="10" text-anchor="middle">D’APRÈS WOLF ET AL., 2022 — DIAGRAMME DE FLUX PRISMA</text>
</svg>
