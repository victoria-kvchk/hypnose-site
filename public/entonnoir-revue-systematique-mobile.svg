<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 842" role="img"
     aria-label="Entonnoir d'une revue systématique. 10 404 articles trouvés, réduits à 9 210 après retrait des doublons, puis à 20 après tri et lecture du texte intégral. 20 études trouvées à la main portent le total à 40 études incluses.">
  <defs>
    <style>
      .num  { font-family: Georgia,'Times New Roman',serif; font-weight:700; fill:#2A201A; }
      .mlab { font-family:'Helvetica Neue',Arial,sans-serif; fill:#8A7E6E; letter-spacing:1.4px; }
      .hd   { font-family:'Helvetica Neue',Arial,sans-serif; fill:#8A7E6E; letter-spacing:2px; }
      .step { font-family: Georgia,'Times New Roman',serif; }
      .exp  { font-family:'Helvetica Neue',Arial,sans-serif; fill:#54504A; }
      .delta{ font-family:'Helvetica Neue',Arial,sans-serif; font-weight:700; fill:#B56C42; }
      .cap  { font-family:'Helvetica Neue',Arial,sans-serif; fill:#4A4744; }
      .foot { font-family:'Helvetica Neue',Arial,sans-serif; fill:#8A7E6E; letter-spacing:0.4px; }
      .h1   { font-family: Georgia,'Times New Roman',serif; font-weight:700; fill:#211915; }
      .h2   { font-family:'Helvetica Neue',Arial,sans-serif; fill:#8A7E6E; letter-spacing:1.8px; }
    </style>
    <linearGradient id="fun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EBDE"/>
      <stop offset="1" stop-color="#E6D2BC"/>
    </linearGradient>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#516A72"/>
    </marker>
    <filter id="psh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6A4638" flood-opacity="0.20"/>
    </filter>
    <clipPath id="fclip">
      <path d="M70,112 C118,215 172,262 185,322 L185,406 L245,406 L245,322 C258,262 312,215 360,112 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="430" height="842" fill="#FBF9F5"/>

  <!-- title -->
  <text class="h1" x="215" y="40" font-size="19" text-anchor="middle">De 10&#8239;404 articles à 40 études</text>
  <text class="h2" x="215" y="60" font-size="9.5" text-anchor="middle">L’ENTONNOIR D’UNE REVUE SYSTÉMATIQUE</text>
  <line x1="188" y1="72" x2="242" y2="72" stroke="#B56C42" stroke-width="2.2"/>

  <!-- funnel -->
  <path d="M70,112 C118,215 172,262 185,322 L185,406 L245,406 L245,322 C258,262 312,215 360,112 Z"
        fill="url(#fun)" stroke="#D9C4A9" stroke-width="1.4"/>
  <g clip-path="url(#fclip)" stroke="#D9C4A9" stroke-width="1">
    <line x1="70" y1="200" x2="360" y2="200"/>
    <line x1="70" y1="286" x2="360" y2="286"/>
  </g>
  <text class="num" x="215" y="172" font-size="25" text-anchor="middle">10&#8239;404</text>
  <text class="mlab" x="215" y="190" font-size="8.5" text-anchor="middle">ARTICLES TROUVÉS</text>
  <text class="num" x="215" y="260" font-size="20" text-anchor="middle">9&#8239;210</text>
  <text class="mlab" x="215" y="277" font-size="8" text-anchor="middle">RESTANTS</text>
  <text class="num" x="215" y="374" font-size="17" text-anchor="middle">20</text>

  <!-- drip + pool + manual input -->
  <line x1="215" y1="406" x2="215" y2="432" stroke="#B56C42" stroke-width="1.6"/>
  <rect x="14" y="442" width="92" height="58" rx="12" fill="#FFFFFF" stroke="#516A72" stroke-width="1.4"/>
  <text class="num" x="60" y="470" font-size="17" text-anchor="middle" style="fill:#516A72">+20</text>
  <text class="mlab" x="60" y="487" font-size="7.5" text-anchor="middle" style="fill:#516A72">À LA MAIN</text>
  <path d="M106,471 C111,471 113,471 116,471" fill="none" stroke="#516A72" stroke-width="1.4" marker-end="url(#arw)"/>
  <rect x="120" y="438" width="196" height="70" rx="16" fill="#B56C42" filter="url(#psh)"/>
  <text class="num" x="218" y="480" font-size="28" text-anchor="middle" style="fill:#FBF9F5">40</text>
  <text class="mlab" x="218" y="498" font-size="8.5" text-anchor="middle" style="fill:#F3E4D4">ÉTUDES INCLUSES</text>

  <!-- legend : removals -->
  <text class="hd" x="24" y="548" font-size="9">CE QUI EST RETIRÉ</text>

  <circle cx="26" cy="572" r="2.8" fill="#B56C42"/>
  <text class="step" x="38" y="577" font-size="13.5" fill="#6A4638" font-style="italic">1 · Doublons retirés</text>
  <text class="delta" x="406" y="577" font-size="12.5" text-anchor="end">−1&#8239;194</text>
  <text class="exp" x="38" y="593" font-size="11">Un même article est indexé dans plusieurs bases.</text>

  <circle cx="26" cy="617" r="2.8" fill="#B56C42"/>
  <text class="step" x="38" y="622" font-size="13.5" fill="#6A4638" font-style="italic">2 · Tri sur titres &amp; résumés</text>
  <text class="delta" x="406" y="622" font-size="12.5" text-anchor="end">−9&#8239;190</text>
  <text class="exp" x="38" y="638" font-size="11">On écarte le hors-sujet sans ouvrir l’article.</text>

  <circle cx="26" cy="662" r="2.8" fill="#B56C42"/>
  <text class="step" x="38" y="667" font-size="13.5" fill="#6A4638" font-style="italic">3 · Lecture du texte intégral</text>
  <text class="exp" x="38" y="683" font-size="11">Lecture complète, critères PICOS. Les 20 sont confirmés.</text>

  <!-- legend : addition -->
  <text class="hd" x="24" y="715" font-size="9">CE QUI EST AJOUTÉ</text>

  <circle cx="26" cy="739" r="2.8" fill="#516A72"/>
  <text class="step" x="38" y="744" font-size="13.5" fill="#516A72" font-style="italic">+ Recherche manuelle</text>
  <text class="delta" x="406" y="744" font-size="12.5" text-anchor="end" style="fill:#516A72">+20</text>
  <text class="exp" x="38" y="760" font-size="11">Bibliographies et littérature grise (thèses, congrès).</text>

  <!-- equation + source -->
  <text class="cap" x="215" y="800" font-size="13" text-anchor="middle">20&#160;&#160;+&#160;&#160;20&#160;&#160;=&#160;&#160;40 études</text>
  <text class="foot" x="215" y="822" font-size="9" text-anchor="middle">D’APRÈS WOLF ET AL., 2022 — FLUX PRISMA</text>
</svg>
